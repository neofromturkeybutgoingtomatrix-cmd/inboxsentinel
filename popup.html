<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;min-height:320px;background:#0b0e11;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;overflow:hidden}

/* ── Header ── */
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);padding:16px 18px 12px;border-bottom:1px solid #1a1f26}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:700;letter-spacing:-0.3px;color:#f0f6fc}
.header .sub{font-size:10px;color:#7d8590;margin-top:2px;letter-spacing:0.3px}

/* ── Stats ── */
.stats{display:flex;padding:14px 18px;gap:12px}
.stat{flex:1;background:#0d1117;border:1px solid #1a1f26;border-radius:10px;padding:10px 12px;text-align:center;transition:border-color .2s}
.stat:hover{border-color:#30363d}
.stat .num{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.stat .lbl{font-size:10px;color:#7d8590;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.stat.senders .num{color:#58a6ff}
.stat.emails .num{color:#3fb950}
.stat.suggest .num{color:#d29922}

/* ── Actions ── */
.actions{display:flex;padding:0 18px 12px;gap:8px}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-scan{background:#238636;color:#fff;flex:2}
.btn-scan:hover{background:#2ea043}
.btn-scan:active{background:#196c2e}
.btn-unsub{background:#0d1117;border-color:#30363d;color:#f85149;flex:1}
.btn-unsub:hover{background:#da363322;border-color:#f85149}
.btn-unsub:active{background:#da363344}

/* ── List ── */
.list{max-height:340px;overflow-y:auto;padding:0 10px}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:#21262d;border-radius:2px}
.card{display:flex;align-items:center;padding:10px 8px;margin-bottom:4px;border-radius:8px;gap:10px;transition:background .15s;cursor:default}
.card:hover{background:#0d1117}
.card.selected{background:#1f6feb11;border:1px solid #1f6feb33}

/* Avatar */
.avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.av-green{background-color:#1a7f3722;color:#3fb950}
.av-blue{background-color:#1f6feb22;color:#58a6ff}
.av-purple{background-color:#8250df22;color:#a371f7}
.av-orange{background-color:#d2992222;color:#d29922}
.av-red{background-color:#f8514922;color:#f85149}
.av-gray{background-color:#30363d;color:#8b949e}

/* Info */
.info{flex:1;min-width:0}
.name{font-weight:600;font-size:12.5px;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.domain{font-size:10.5px;color:#7d8590;margin-top:1px}
.bar-wrap{height:3px;background:#21262d;border-radius:2px;margin-top:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.bar-low{background:#3fb950}
.bar-med{background:#d29922}
.bar-high{background:#f85149}

/* Right side */
.meta{text-align:right;flex-shrink:0}
.count{font-size:16px;font-weight:700;color:#e6edf3}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;margin-top:3px;display:inline-block}
.tag-service{background:#30363d22;color:#484f58;border:1px solid #30363d}
.tag-unsub{cursor:pointer;background:#1a7f3722;color:#3fb950;border:1px solid #1a7f3744}
.tag-unsub:hover{background:#1a7f3744}

/* ── Empty ── */
.empty{padding:40px 20px;text-align:center}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.3}
.empty p{color:#484f58;font-size:12px;line-height:1.5}

/* ── Status ── */
.status{padding:8px 18px;font-size:10px;color:#484f58;text-align:center;border-top:1px solid #1a1f26}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .2s ease-out}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>InboxSentinel</h1>
      <div class="sub">Subscription Auditor</div>
    </div>
    <span style="font-size:10px;color:#7d8590;background:#1a1f26;padding:2px 8px;border-radius:6px;">v0.2</span>
  </div>
</div>

<div class="stats">
  <div class="stat senders">
    <div class="num" id="total-senders">—</div>
    <div class="lbl">Senders</div>
  </div>
  <div class="stat emails">
    <div class="num" id="total-emails">—</div>
    <div class="lbl">Emails</div>
  </div>
  <div class="stat suggest">
    <div class="num" id="to-unsub">—</div>
    <div class="lbl">Suggested</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-scan" id="scan-btn">Scan Inbox</button>
  <button class="btn btn-unsub" id="unsub-all-btn" style="display:none">Unsub All</button>
</div>

<div class="list" id="sender-list">
  <div class="empty">
    <div class="empty-icon">📥</div>
    <p>Open Gmail and click Scan Inbox<br>to audit your subscriptions</p>
  </div>
</div>

<div class="status" id="status">Ready</div>

<script src="popup.js"></script>
</body>
</html>
